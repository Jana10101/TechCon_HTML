<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register for TechCon 2024</title>
</head>
<body>
  <!-- HEADER -->
  <header>
    <h1>Register for TechCon 2024</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <h2>Attendee Registration Form</h2>
    <form action="submit_registration" method="post">
      <!-- Name Field -->
      <div>
        <label for="full-name">Full Name:</label>
        <input type="text" id="full-name" name="full_name" required>
      </div>
      <!-- Email Field -->
      <div>
        <label for="email-address">Email Address:</label>
        <input type="email" id="email-address" name="email_address" required>
      </div>
      <!-- Password Field -->
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <!-- Password Confirmation Field -->
      <div>
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm_password" required>
      </div>
      <!-- Terms & Conditions Checkbox -->
      <div>
        <input type="checkbox" id="agree-terms" name="agree_terms" required>
        <label for="agree-terms">I agree to the <a href="terms_and_conditions.html" target="_blank">Terms and Conditions</a></label>
      </div>
      <!-- Submit Button -->
      <div>
        <button type="submit">Register Now</button>
      </div>
    </form>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Copyright © 2024 TechCon 2024</p>
  </footer>
</body>
</html>
